name: desktop

on:
  pull_request:
    paths:
      - ".github/workflows/desktop.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "packages/desktop/**"
      - "packages/server/**"
      - "packages/spa/**"
  workflow_dispatch:

jobs:
  package-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package desktop app
        run: pnpm pack:desktop

      - uses: actions/upload-artifact@v4
        with:
          name: byconvo-desktop-macos
          path: packages/desktop/dist-packaged/**
