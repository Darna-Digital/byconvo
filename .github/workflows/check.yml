name: check

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Installs pnpm using the version from the "packageManager" field in package.json
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      # --ignore-scripts: this job only runs ESLint + Prettier (pure JS), so we
      # skip native build scripts (better-sqlite3, esbuild, ...) for a faster,
      # deterministic install. pnpm 11 otherwise errors on un-approved builds.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check
